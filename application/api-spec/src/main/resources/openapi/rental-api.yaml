openapi: 3.0.0
info:
  title: Property Rental API
  version: 1.0.0
  description: API for managing property rental listings
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []

paths:
  /api/listings:
    get:
      summary: Search active listings with optional filters
      operationId: searchListings
      tags:
        - Listing
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: listingType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ListingType'
        - name: priceMin
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: priceMax
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: propertyType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PropertyType'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Listings matching the filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingSearchResponse'
        '401':
          description: Unauthorized - Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new property listing
      operationId: createListing
      tags:
        - Listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListingRequest'
      responses:
        '201':
          description: Listing successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
        '400':
          description: Bad Request - Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - User is not an OWNER
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/listings/featured:
    get:
      summary: Get featured listings, optionally filtered (public endpoint for home page)
      operationId: getFeaturedListings
      tags:
        - Listing
      security: []
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: listingType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ListingType'
        - name: propertyType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PropertyType'
      responses:
        '200':
          description: Featured listings (limited list, can be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListingSummary'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/viewings:
    post:
      summary: Create a viewing request for a listing
      operationId: createViewingRequest
      tags:
        - ViewingRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateViewingRequest'
      responses:
        '201':
          description: Viewing request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewingRequestResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/viewings/my:
    get:
      summary: List viewing requests created by the current user
      operationId: getMyViewingRequests
      tags:
        - ViewingRequest
      responses:
        '200':
          description: List of viewing requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ViewingRequestResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/viewings/owner:
    get:
      summary: List viewing requests for listings owned by the current user
      operationId: getOwnerViewingRequests
      tags:
        - ViewingRequest
      responses:
        '200':
          description: List of viewing requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ViewingRequestResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/viewings/{id}/approve:
    patch:
      summary: Approve a viewing request (owner only)
      operationId: approveViewingRequest
      tags:
        - ViewingRequest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewingRequestResponse'
        '400':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/viewings/{id}/reject:
    patch:
      summary: Reject a viewing request (owner only)
      operationId: rejectViewingRequest
      tags:
        - ViewingRequest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewingRequestResponse'
        '400':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/viewings/{id}/cancel:
    patch:
      summary: Cancel a viewing request (requester only)
      operationId: cancelViewingRequest
      tags:
        - ViewingRequest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewingRequestResponse'
        '400':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/listings/my:
    get:
      summary: List listings owned by the current authenticated user
      operationId: getMyListings
      tags:
        - Listing
      responses:
        '200':
          description: Listings owned by current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListingResponse'
        '401':
          description: Unauthorized - Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/favorites:
    get:
      summary: List favorites of the current authenticated user
      operationId: getMyFavorites
      tags:
        - Favorite
      responses:
        '200':
          description: User's favorites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FavoriteResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/favorites/{listingId}:
    post:
      summary: Add listing to favorites
      operationId: addFavorite
      tags:
        - Favorite
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: Favorite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteResponse'
        '400':
          description: Already in favorites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Remove listing from favorites
      operationId: removeFavorite
      tags:
        - Favorite
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Favorite removed
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Favorite not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/listings/{id}:
    get:
      summary: Get listing by ID
      operationId: getListingById
      tags:
        - Listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Listing found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
        '401':
          description: Unauthorized - Missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateListingRequest:
      type: object
      required:
        - title
        - description
        - listingType
        - address
        - price
        - features
      properties:
        title:
          type: string
          description: Title of the listing
          example: "Modern 2-bedroom apartment in city center"
        description:
          type: string
          description: Detailed description of the property
          example: "Beautiful apartment with great view"
        listingType:
          $ref: '#/components/schemas/ListingType'
        address:
          $ref: '#/components/schemas/AddressRequest'
        price:
          $ref: '#/components/schemas/PriceRequest'
        features:
          $ref: '#/components/schemas/PropertyFeaturesRequest'

    CreateViewingRequest:
      type: object
      required: [ listingId, requestedDate ]
      properties:
        listingId:
          type: integer
          format: int64
        requestedDate:
          type: string
          format: date-time
        note:
          type: string

    ViewingRequestResponse:
      type: object
      required: [ id, listing, status, requestedDate ]
      properties:
        id:
          type: integer
          format: int64
        listing:
          $ref: '#/components/schemas/ListingSummary'
        requester:
          $ref: '#/components/schemas/User'
        owner:
          $ref: '#/components/schemas/User'
        status:
          $ref: '#/components/schemas/ViewingStatus'
        requestedDate:
          type: string
          format: date-time
        note:
          type: string

    ViewingStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - REJECTED
        - CANCELLED

    FavoriteResponse:
      type: object
      required: [ id, listing, createdAt ]
      properties:
        id:
          type: integer
          format: int64
        listing:
          $ref: '#/components/schemas/ListingSummary'
        createdAt:
          type: string
          format: date-time

    ListingSummary:
      type: object
      required: [ id, title, listingType, city, price ]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        listingType:
          $ref: '#/components/schemas/ListingType'
        city:
          type: string
        price:
          $ref: '#/components/schemas/PriceResponse'

    ListingResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: "Modern 2-bedroom apartment in city center"
        description:
          type: string
          example: "Beautiful apartment with great view"
        listingType:
          $ref: '#/components/schemas/ListingType'
        status:
          $ref: '#/components/schemas/ListingStatus'
        createdAt:
          type: string
          format: date-time
          example: "2025-04-03T10:00:00Z"
        address:
          $ref: '#/components/schemas/AddressResponse'
        price:
          $ref: '#/components/schemas/PriceResponse'
        features:
          $ref: '#/components/schemas/PropertyFeaturesResponse'
        ownerId:
          type: integer
          format: int64
          example: 123
        owner:
          $ref: '#/components/schemas/User'

    AddressRequest:
      type: object
      required:
        - street
        - city
        - postalCode
        - country
      properties:
        street:
          type: string
          example: "Main Street 123"
        city:
          type: string
          example: "Bratislava"
        postalCode:
          type: string
          example: "81101"
        country:
          type: string
          example: "Slovakia"
        district:
          type: string
          example: "Old Town"
        region:
          type: string
          example: "Bratislava Region"
        lat:
          type: number
          format: double
          example: 48.1486
        lng:
          type: number
          format: double
          example: 17.1077

    AddressResponse:
      type: object
      properties:
        street:
          type: string
          example: "Main Street 123"
        city:
          type: string
          example: "Bratislava"
        postalCode:
          type: string
          example: "81101"
        country:
          type: string
          example: "Slovakia"
        district:
          type: string
          example: "Old Town"
        region:
          type: string
          example: "Bratislava Region"
        lat:
          type: number
          format: double
          example: 48.1486
        lng:
          type: number
          format: double
          example: 17.1077

    PriceRequest:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          format: double
          example: 850.00
        currency:
          type: string
          example: "EUR"

    PriceResponse:
      type: object
      properties:
        amount:
          type: number
          format: double
          example: 850.00
        currency:
          type: string
          example: "EUR"

    PropertyFeaturesRequest:
      type: object
      required:
        - propertyType
      properties:
        propertyType:
          $ref: '#/components/schemas/PropertyType'
        area:
          type: number
          format: double
          description: Area in square meters
          example: 65.5
        roomCount:
          type: integer
          example: 2
        floor:
          type: integer
          example: 3
        furnished:
          type: boolean
          example: true
        parkingAvailable:
          type: boolean
          example: false
        balcony:
          type: boolean
          example: true
        elevator:
          type: boolean
          example: false
        petsAllowed:
          type: boolean
          example: true
        energyClass:
          type: string
          example: "A"
        yearBuilt:
          type: integer
          example: 2015

    PropertyFeaturesResponse:
      type: object
      properties:
        propertyType:
          $ref: '#/components/schemas/PropertyType'
        area:
          type: number
          format: double
          example: 65.5
        roomCount:
          type: integer
          example: 2
        floor:
          type: integer
          example: 3
        furnished:
          type: boolean
          example: true
        parkingAvailable:
          type: boolean
          example: false
        balcony:
          type: boolean
          example: true
        elevator:
          type: boolean
          example: false
        petsAllowed:
          type: boolean
          example: true
        energyClass:
          type: string
          example: "A"
        yearBuilt:
          type: integer
          example: 2015

    ListingType:
      type: string
      enum:
        - RENT
        - SALE
      example: RENT

    ListingStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
      example: INACTIVE

    PropertyType:
      type: string
      enum:
        - APARTMENT
        - HOUSE
        - ROOM
      example: APARTMENT

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          example: "owner@example.com"
        role:
          $ref: '#/components/schemas/UserRole'

    UserRole:
      type: string
      enum:
        - OWNER
        - USER
      example: OWNER

    ListingSearchResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ListingResponse'
        pagination:
          $ref: '#/components/schemas/PaginationResponse'

    PaginationResponse:
      type: object
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 10
        totalElements:
          type: integer
          format: int64
          example: 42
        totalPages:
          type: integer
          example: 5

    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          description: Type of error
          example: "VALIDATION"
        message:
          type: string
          description: Error message
          example: "Listing title is required."
        field:
          type: string
          description: Field name for validation errors (optional)
          example: "title"
        timestamp:
          type: string
          format: date-time
          example: "2025-04-03T10:00:00Z"

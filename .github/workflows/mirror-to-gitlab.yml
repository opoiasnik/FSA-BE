name: Mirror to GitLab

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GPAT }}
        run: |
          git fetch --unshallow
          git remote remove origin
          git remote add gitlab https://oauth2:${GITLAB_TOKEN}@gitlab.fullstackacademy.sk/opoiasnik/FSA-BE.git
          git push --mirror gitlab
